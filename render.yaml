services:
  - type: web
    name: hrushetest-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: CLIENT_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: COOKIE_SAME_SITE
        value: none
      - key: COOKIE_SECURE
        value: "true"
      - key: COOKIE_DOMAIN
        sync: false
      - key: GOKWIK_HOSTED_CHECKOUT_URL
        sync: false
      - key: GOKWIK_WEBHOOK_SECRET
        sync: false
